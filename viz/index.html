<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How Modern Music Resurrects the Past</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafaf8;
        --text: #1f1f1b;
        --muted: #666666;
        --hairline: rgba(31, 31, 27, 0.1);
        --warm: #e07a5f;
        --cool: #4a7fa5;
        --cool-soft: #a0b8c8;
        --sample: #e07a5f;
        --interpolate: #3d8b8b;
        --cover: #9b72aa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
      }

      body {
        overflow-x: hidden;
        overflow-y: auto;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      .page {
        display: grid;
        grid-template-rows: 100px 1fr;
        width: 100vw;
        min-height: 100vh;
      }

      .header {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        padding: 18px 28px 14px;
      }

      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        font-size: clamp(26px, 3.1vw, 40px);
        line-height: 0.98;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0;
        color: #707070;
        font-size: 13px;
        line-height: 1.35;
      }

      .header-legend {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 16px;
        color: #999999;
        font-size: 11px;
        white-space: nowrap;
      }

      .header-legend-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .header-legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex: 0 0 auto;
      }

      .header-legend-stroke {
        width: 14px;
        height: 0;
        border-top: 2px solid currentColor;
        border-radius: 999px;
        flex: 0 0 auto;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-width: 0;
      }

      .filters {
        display: flex;
        gap: 8px;
        min-width: 0;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .filters::-webkit-scrollbar {
        display: none;
      }

      .year-button {
        flex: 0 0 auto;
        border: 1px solid rgba(31, 31, 27, 0.15);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
        color: #666666;
        padding: 5px 12px;
        font: inherit;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition:
          background 180ms ease,
          color 180ms ease,
          border-color 180ms ease;
      }

      .year-button:hover {
        background: rgba(224, 122, 95, 0.08);
        border-color: rgba(224, 122, 95, 0.35);
      }

      .year-button.is-active {
        background: #1f1f1b;
        border-color: #1f1f1b;
        color: #ffffff;
      }

      .counter {
        flex: 0 0 auto;
        color: #7a7a7a;
        font-size: 11px;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .chart-shell {
        position: relative;
        width: 100vw;
        height: auto;
        min-height: calc(100vh - 100px);
      }

      #chart,
      svg {
        width: 100%;
        height: 100%;
        display: block;
        background: var(--bg);
        overflow: visible;
      }

      .arc {
        fill: none;
        opacity: 0.06;
        stroke-linecap: round;
        pointer-events: stroke;
      }

      .revival-mark,
      .original-mark {
        cursor: pointer;
      }

      .revival-mark text {
        font-size: 9px;
        pointer-events: none;
      }

      .revival-mark .song-label {
        fill: #333333;
        font-weight: 600;
      }

      .revival-mark .artist-label {
        fill: #999999;
      }

      .revival-mark .peak-label {
        fill: #e07a5f;
        font-size: 11px;
        font-weight: 700;
      }

      .legend {
        position: absolute;
        left: 24px;
        bottom: 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px 16px;
        border: 1px solid rgba(31, 31, 27, 0.08);
        border-radius: 16px;
        background: rgba(250, 250, 248, 0.9);
        backdrop-filter: blur(8px);
      }

      .legend-row,
      .legend-swatches {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #4a4a4a;
        font-size: 12px;
      }

      .legend-circle {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        flex: 0 0 auto;
      }

      .legend-stroke {
        width: 18px;
        height: 0;
        border-top: 3px solid currentColor;
        border-radius: 999px;
        flex: 0 0 auto;
      }

      .legend-note {
        color: #747474;
        font-size: 11px;
      }

      .inline-label {
        pointer-events: none;
        opacity: 0;
      }

      .inline-label rect {
        fill: rgba(255, 255, 255, 0.96);
        rx: 4px;
        ry: 4px;
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.12));
      }

      .inline-label .song {
        font-size: 9px;
        font-weight: 700;
      }

      .inline-label .artist {
        font-size: 9px;
        fill: #999999;
      }

      .inline-label .year {
        font-size: 10px;
        fill: #999999;
      }

      .inline-label .peak {
        font-size: 11px;
        font-weight: 700;
        fill: #e07a5f;
      }

      .inline-label.original .song,
      .inline-label.original .artist {
        fill: #4a7fa5;
      }

      .empty-state {
        display: grid;
        place-items: center;
        height: 100%;
        color: #9a9a9a;
        font-size: 14px;
      }

      @media (max-width: 720px) {
        .header {
          padding: 16px 16px 12px;
        }

        .header-top {
          align-items: flex-start;
          flex-direction: column;
          gap: 12px;
        }

        .counter {
          font-size: 10px;
        }

        .year-button {
          padding: 5px 10px;
        }

        .legend {
          left: 16px;
          right: 16px;
          bottom: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-top">
          <div class="title-block">
            <h1>How Modern Music Resurrects the Past</h1>
            <p class="subtitle">Bubble size = chart peak. Arc length = how far back it reached. Height = weeks on chart.</p>
          </div>
          <div class="header-legend" aria-label="Legend">
            <span class="header-legend-item"><span class="header-legend-dot" style="background: #e07a5f"></span><span>This year's hit</span></span>
            <span class="header-legend-item"><span class="header-legend-dot" style="background: #4a7fa5"></span><span>Original song sampled</span></span>
            <span class="header-legend-item"><span>Longer arc = older sample</span></span>
            <span class="header-legend-item" style="color: #e07a5f"><span class="header-legend-stroke"></span><span>Samples</span></span>
            <span class="header-legend-item" style="color: #3d8b8b"><span class="header-legend-stroke"></span><span>Interpolates</span></span>
            <span class="header-legend-item" style="color: #9b72aa"><span class="header-legend-stroke"></span><span>Cover</span></span>
          </div>
        </div>
        <div class="controls">
          <div id="filters" class="filters" aria-label="Year filters"></div>
          <div id="counter" class="counter"></div>
        </div>
      </header>

      <section class="chart-shell">
        <div id="chart" aria-label="Music sample connections chart"></div>
      </section>
    </div>

    <script>
      const YEAR_OPTIONS = ["ALL", 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025];
      const DEFAULT_YEAR = 2024;
      const RELATIONSHIP_COLOR = {
        samples: "#E07A5F",
        interpolates: "#3D8B8B",
        cover: "#9B72AA"
      };

      const chartNode = document.getElementById("chart");
      const filtersNode = document.getElementById("filters");
      const counterNode = document.getElementById("counter");

      let allRows = [];
      let activeYear = DEFAULT_YEAR;
      let lockedId = null;
      let svg;
      let rootLayer;
      let bandLayer;
      let timelineLayer;
      let arcLayer;
      let originalLayer;
      let revivalLayer;
      let labelLayer;
      let revivalLabel;
      let originalLabelsLayer;
      let arcSelection = d3.select(null);
      let originalSelection = d3.select(null);
      let revivalSelection = d3.select(null);
      let resizeTimer;
      let maxWeeksOnChart = 1;

      function truncate(text, maxLength = 25) {
        return text.length > maxLength ? `${text.slice(0, maxLength - 1).trimEnd()}…` : text;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function weeksRadius(weeks) {
        if (!Number.isFinite(weeks) || weeks <= 0) {
          return 5;
        }

        return clamp(5 + (weeks / 112) * 28, 5, 33);
      }

      function originalRadius(row) {
        return row.everCharted ? weeksRadius(row.originalWeeksOnChart) : 5;
      }

      function peakLabel(peak) {
        return Number.isFinite(peak) ? `#${Math.round(peak)}` : "uncharted";
      }

      function colorWithOpacity(color, opacity) {
        const parsed = d3.color(color);
        if (!parsed) {
          return color;
        }

        parsed.opacity = opacity;
        return `${parsed}`;
      }

      function setInlineLabel(label, lines, x, y, anchor, className) {
        label.attr("class", `inline-label ${className}`);

        const text = label.select("text").attr("text-anchor", anchor);
        const tspans = text.selectAll("tspan").data(lines);

        tspans
          .join("tspan")
          .attr("class", (_, index) => (index === 0 ? "song" : index === 1 ? "artist" : index === 2 ? "year" : "peak"))
          .attr("x", x)
          .attr("dy", (_, index) => (index === 0 ? 0 : 12))
          .text((d) => d);

        label.style("opacity", 1);

        const bbox = text.node().getBBox();
        const paddingX = 8;
        const paddingY = 4;

        label
          .select("rect")
          .attr("x", bbox.x - paddingX)
          .attr("y", bbox.y - paddingY)
          .attr("width", bbox.width + paddingX * 2)
          .attr("height", bbox.height + paddingY * 2);

        label.attr("transform", `translate(0,${y - (bbox.y + bbox.height / 2)})`);
      }

      function showInlineLabels(link, originalItems = [link]) {
        setInlineLabel(
          revivalLabel,
          [link.revivalSong, link.revivalArtist, String(link.revivalChartYear), peakLabel(link.revivalPeak)],
          link.revivalX - link.revivalR - 12,
          link.revivalY,
          "end",
          "revival"
        );

        const originalLabels = originalLabelsLayer
          .selectAll("g.original-inline-label")
          .data(originalItems, (d) => d.id)
          .join(
            (enter) => {
              const group = enter.append("g");
              group.append("rect").attr("rx", 4).attr("ry", 4);
              group.append("text");
              return group;
            },
            (update) => update,
            (exit) => exit.remove()
          );

        originalLabels.each(function (item) {
          setInlineLabel(
            d3.select(this),
            [item.originalSong, item.originalArtist, String(item.originalReleaseYear), peakLabel(item.originalPeakDisplay)],
            item.originalX + item.originalR + 12,
            item.originalY,
            "start",
            "original original-inline-label"
          );
        });
      }

      function hideInlineLabels() {
        revivalLabel.style("opacity", 0);
        originalLabelsLayer.selectAll("g.original-inline-label").remove();
      }

      function buildButtons() {
        filtersNode.innerHTML = "";

        YEAR_OPTIONS.forEach((year) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "year-button";
          button.dataset.year = String(year);
          button.textContent = String(year);
          button.addEventListener("click", () => {
            if (activeYear === year) {
              return;
            }

            activeYear = year;
            lockedId = null;
            hideInlineLabels();
            render(true);
          });
          filtersNode.appendChild(button);
        });
      }

      function updateButtons() {
        filtersNode.querySelectorAll(".year-button").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.year === String(activeYear));
        });
      }

      function filteredRows() {
        return activeYear === "ALL"
          ? allRows.slice()
          : allRows.filter((row) => row.revivalChartYear === activeYear);
      }

      function buildRevivalColorMap(rows) {
        const uniqueRevivals = new Map();

        rows.forEach((row) => {
          const key = `${row.revivalSong}__${row.revivalArtist}`.toLowerCase();
          if (!uniqueRevivals.has(key)) {
            uniqueRevivals.set(key, row);
          }
        });

        const colorMap = new Map();
        const grouped = d3.group([...uniqueRevivals.entries()], ([, row]) => row.relationshipType);

        grouped.forEach((entries, relationshipType) => {
          const sortedEntries = entries.slice().sort(([, a], [, b]) => {
            return (
              d3.ascending(a.revivalPeak, b.revivalPeak) ||
              d3.descending(a.revivalWeeksOnChart, b.revivalWeeksOnChart) ||
              d3.descending(a.revivalSpotifyPopularity, b.revivalSpotifyPopularity) ||
              d3.ascending(a.revivalSong, b.revivalSong) ||
              d3.ascending(a.revivalArtist, b.revivalArtist)
            );
          });

          if (relationshipType === "cover") {
            sortedEntries.forEach(([key]) => colorMap.set(key, "#9B72AA"));
            return;
          }

          const interpolator =
            relationshipType === "interpolates"
              ? d3.interpolateRgb("#3D8B8B", "#5B7FA6")
              : d3.interpolateRgb("#E07A5F", "#C45C8A");

          sortedEntries.forEach(([key], index) => {
            const t = sortedEntries.length === 1 ? 0.5 : index / (sortedEntries.length - 1);
            colorMap.set(key, interpolator(t));
          });
        });

        return colorMap;
      }

      function computeLayout(rows, width, height) {
        const revivalXBase = width - 180;
        const leftMargin = 80;
        const topMargin = 80;
        const uniqueRevivals = new Map();
        rows.forEach((row) => {
          const key = `${row.revivalSong}__${row.revivalArtist}`.toLowerCase();
          if (!uniqueRevivals.has(key)) {
            uniqueRevivals.set(key, row);
          }
        });
        const revivalCount = Math.max(uniqueRevivals.size, 1);
        const slotHeight = Math.max((height - 120) / revivalCount, 0);
        const bottomMargin = height - 40;
        const yScale = d3
          .scaleLinear()
          .domain([1, 100])
          .range([topMargin, bottomMargin])
          .clamp(true);
        const makeRankedPositionMap = (items, keyFn, peakFn, sortFn, radiusFn) => {
          const uniqueItems = new Map();

          items.forEach((item) => {
            const key = keyFn(item);
            if (!uniqueItems.has(key)) {
              uniqueItems.set(key, item);
            }
          });

          const sortedItems = [...uniqueItems.values()].sort(sortFn);
          const peakGroupIndex = new Map();
          const peakGroupSizes = d3.rollup(
            sortedItems,
            (group) => group.length,
            (item) => peakFn(item)
          );

          const positionedItems = sortedItems.map((item, index) => {
            const peakValue = peakFn(item);
            const indexWithinGroup = peakGroupIndex.get(peakValue) || 0;
            peakGroupIndex.set(peakValue, indexWithinGroup + 1);

            const wrappedIndex = indexWithinGroup % 3;
            const wrappedGroupSize = Math.min(peakGroupSizes.get(peakValue) || 1, 3);
            const xOffset = (wrappedIndex - (wrappedGroupSize - 1) / 2) * 28;

            return {
              key: keyFn(item),
              y: topMargin + index * slotHeight + slotHeight / 2,
              xOffset,
              r: radiusFn(item),
            };
          });

          return new Map(
            positionedItems.map((item) => [
              item.key,
              {
                y: item.y,
                xOffset: item.xOffset,
              },
            ])
          );
        };
        const makePeakOffsetMap = (items, keyFn, peakFn, tiebreakFn) => {
          const uniqueItems = new Map();

          items.forEach((item) => {
            const key = keyFn(item);
            if (!uniqueItems.has(key)) {
              uniqueItems.set(key, item);
            }
          });

          const groups = d3.group([...uniqueItems.values()], (item) => peakFn(item));
          const yMap = new Map();

          [...groups.entries()].forEach(([peakValue, groupItems]) => {
            if (!Number.isFinite(peakValue)) {
              return;
            }

            const sortedGroup = groupItems.slice().sort((a, b) => {
              return (
                d3.descending(tiebreakFn(a), tiebreakFn(b)) ||
                d3.ascending(a.revivalSong || a.originalSong, b.revivalSong || b.originalSong) ||
                d3.ascending(a.revivalArtist || a.originalArtist, b.revivalArtist || b.originalArtist)
              );
            });

            const targetY = yScale(peakValue);
            const groupSize = sortedGroup.length;

            sortedGroup.forEach((item, index) => {
              const rawOffset = (index - (groupSize - 1) / 2) * 14;
              const offset = clamp(rawOffset, -20, 20);
              yMap.set(keyFn(item), targetY + offset);
            });
          });

          return yMap;
        };

        const revivalPositionMap = makeRankedPositionMap(
          rows,
          (row) => `${row.revivalSong}__${row.revivalArtist}`.toLowerCase(),
          (row) => row.revivalPeak,
          (a, b) =>
            d3.ascending(a.revivalPeak, b.revivalPeak) ||
            d3.descending(a.revivalWeeksOnChart, b.revivalWeeksOnChart) ||
            d3.descending(a.revivalSpotifyPopularity, b.revivalSpotifyPopularity) ||
            d3.ascending(a.revivalSong, b.revivalSong) ||
            d3.ascending(a.revivalArtist, b.revivalArtist),
          (row) => weeksRadius(row.revivalWeeksOnChart)
        );
        const originalYMap = makePeakOffsetMap(
          rows.filter((row) => row.everCharted && Number.isFinite(row.originalPeak)),
          (row) => `${row.originalSong}__${row.originalArtist}`.toLowerCase(),
          (row) => row.originalPeak,
          (row) => row.originalWeeksOnChart
        );
        const revivalColorMap = buildRevivalColorMap(rows);
        const positionedRows = rows
          .slice()
          .sort(
            (a, b) =>
              d3.ascending(a.revivalPeak, b.revivalPeak) ||
              d3.ascending(a.revivalSong, b.revivalSong) ||
              d3.ascending(a.originalSong, b.originalSong)
          )
          .map((row) => {
            const revivalKey = `${row.revivalSong}__${row.revivalArtist}`.toLowerCase();
            const originalKey = `${row.originalSong}__${row.originalArtist}`.toLowerCase();
            const revivalPosition = revivalPositionMap.get(revivalKey) || { y: topMargin, xOffset: 0 };
            const revivalY = revivalPosition.y;
            const revivalX = revivalXBase + revivalPosition.xOffset;
            const revivalR = weeksRadius(row.revivalWeeksOnChart);
            const originalR = originalRadius(row);
            const revivalColor = revivalColorMap.get(revivalKey) || RELATIONSHIP_COLOR[row.relationshipType];
            const originalColor = revivalColor;
            if (!originalColor) {
              console.log("original bubble missing color", {
                originalSong: row.originalSong,
                originalArtist: row.originalArtist,
                revivalSong: row.revivalSong,
                revivalArtist: row.revivalArtist,
                relationshipType: row.relationshipType,
              });
            }
            const originalX = clamp(
              revivalX - (row.yearsBetween / 90) * (width * 0.85),
              leftMargin + 20,
              revivalX - 24
            );
            const originalY = clamp(
              row.everCharted && Number.isFinite(row.originalPeak)
                ? (originalYMap.get(originalKey) ?? yScale(row.originalPeak))
                : bottomMargin,
              topMargin,
              bottomMargin
            );
            const startX = originalX + originalR;
            const endX = revivalX - revivalR;
            const cp1x = originalX + (revivalX - originalX) * 0.3;
            const cp2x = originalX + (revivalX - originalX) * 0.7;

            return {
              ...row,
              revivalKey,
              originalKey,
              revivalX,
              revivalY,
              revivalR,
              originalX,
              originalY,
              originalR,
              revivalColor,
              originalColor,
              stroke: revivalColor,
              strokeWidth: 0.5 + (row.yearsBetween / 90) * 3,
              revivalSongLabel: truncate(row.revivalSong, 28),
              revivalArtistLabel: truncate(row.revivalArtist, 28),
              revivalPeakLabel: peakLabel(row.revivalPeak),
              path: `M${startX},${originalY} C${cp1x},${originalY} ${cp2x},${revivalY} ${endX},${revivalY}`
            };
          });

        const bubbleYValues = positionedRows.flatMap((row) => [row.revivalY, row.originalY]);
        console.log("bubble y bounds", {
          minY: d3.min(bubbleYValues),
          maxY: d3.max(bubbleYValues),
          topMargin,
          bottomMargin,
        });

        return positionedRows;
      }

      function pulseOriginal(id) {
        const target = originalSelection.filter((d) => d.id === id);

        target
          .interrupt()
          .transition()
          .duration(180)
          .attrTween("transform", (d) => {
            const interpolate = d3.interpolateNumber(1, 1.5);
            return (t) => `translate(${d.originalX},${d.originalY}) scale(${interpolate(t)})`;
          })
          .transition()
          .duration(220)
          .attrTween("transform", (d) => {
            const interpolate = d3.interpolateNumber(1.5, 1);
            return (t) => `translate(${d.originalX},${d.originalY}) scale(${interpolate(t)})`;
          });
      }

      function resetFocus() {
        const t = d3.transition().duration(200);
        arcSelection.transition(t).style("opacity", 0.06);
        revivalSelection.transition(t).style("opacity", 1);
        originalSelection.transition(t).style("opacity", 1);
        hideInlineLabels();
      }

      function applyFocus(link, pulse = false) {
        const t = d3.transition().duration(200);
        arcSelection
          .transition(t)
          .style("opacity", (d) => (d.id === link.id ? 0.92 : 0.02));

        arcSelection
          .filter((d) => d.id === link.id)
          .raise();

        revivalSelection
          .transition(t)
          .style("opacity", (d) => (d.revivalKey === link.revivalKey ? 1 : 0.08));

        revivalSelection
          .filter((d) => d.revivalKey === link.revivalKey)
          .raise();

        originalSelection
          .transition(t)
          .style("opacity", (d) => (d.id === link.id ? 1 : 0.08));

        originalSelection
          .filter((d) => d.id === link.id)
          .raise();

        if (pulse) {
          pulseOriginal(link.id);
        }

        showInlineLabels(link);
      }

      function applyRevivalFocus(revival, pulse = false) {
        const relatedIds = new Set(revival.originals.map((item) => item.id));
        const t = d3.transition().duration(200);

        arcSelection
          .transition(t)
          .style("opacity", (d) => (relatedIds.has(d.id) ? 0.92 : 0.02));

        arcSelection
          .filter((d) => relatedIds.has(d.id))
          .raise();

        revivalSelection
          .transition(t)
          .style("opacity", (d) => (d.revivalKey === revival.revivalKey ? 1 : 0.08));

        revivalSelection
          .filter((d) => d.revivalKey === revival.revivalKey)
          .raise();

        originalSelection
          .transition(t)
          .style("opacity", (d) => (relatedIds.has(d.id) ? 1 : 0.08));

        originalSelection
          .filter((d) => relatedIds.has(d.id))
          .raise();

        if (pulse) {
          revival.originals.forEach((item) => {
            pulseOriginal(item.id);
          });
        }

        console.log("hover originals length", revival.originals.length);
        showInlineLabels(revival.originals[0], revival.originals);
      }

      function bindInteraction(selection) {
        selection
          .on("mouseenter", function (event, link) {
            if (lockedId && lockedId !== link.id) {
              return;
            }

            d3.select(this).raise();
            applyFocus(link, !lockedId);
          })
          .on("mouseleave", function () {
            if (!lockedId) {
              resetFocus();
            }
          })
          .on("click", function (event, link) {
            event.stopPropagation();
            lockedId = link.id;
            d3.select(this).raise();
            applyFocus(link, false);
          });
      }

      function ensureSvg(width, height) {
        d3.select(chartNode).selectAll(".empty-state").remove();

        if (!svg) {
          svg = d3.select(chartNode).append("svg");
          rootLayer = svg.append("g");
          bandLayer = rootLayer.append("g");
          timelineLayer = rootLayer.append("g");
          arcLayer = rootLayer.append("g");
          originalLayer = rootLayer.append("g");
          revivalLayer = rootLayer.append("g");
          labelLayer = rootLayer.append("g");

          revivalLabel = labelLayer.append("g");
          revivalLabel.append("rect").attr("rx", 4).attr("ry", 4);
          revivalLabel.append("text");

          originalLabelsLayer = labelLayer.append("g");

          svg.on("click", () => {
            if (!lockedId) {
              return;
            }

            lockedId = null;
            resetFocus();
          });
        }

        svg
          .attr("width", width)
          .attr("height", height)
          .attr("viewBox", `0 0 ${width} ${height}`)
          .attr("preserveAspectRatio", "xMidYMid meet")
          .style("width", `${width}px`)
          .style("height", `${height}px`);
      }

      function render(animate) {
        const width = window.innerWidth;
        const rows = filteredRows();
        const topMargin = 80;
        const uniqueRevivals = new Map();
        rows.forEach((row) => {
          const key = `${row.revivalSong}__${row.revivalArtist}`.toLowerCase();
          if (!uniqueRevivals.has(key)) {
            uniqueRevivals.set(key, row);
          }
        });
        const revivalCount = Math.max(uniqueRevivals.size, 1);
        const viewportHeight = window.innerHeight - 100;
        const height = viewportHeight;
        const slotHeight = Math.max((height - 120) / revivalCount, 0);

        chartNode.style.height = `${height}px`;
        counterNode.textContent = `Showing ${rows.length} connections`;
        updateButtons();

        ensureSvg(width, height);

        svg.selectAll(".arc").remove();
        svg.selectAll("g.original-mark").remove();
        svg.selectAll("g.revival-mark").remove();
        svg.selectAll(".inline-label").remove();

        arcLayer.selectAll("*").remove();
        originalLayer.selectAll("*").remove();
        revivalLayer.selectAll("*").remove();
        labelLayer.selectAll("*").remove();

        revivalLabel = labelLayer.append("g");
        revivalLabel.append("rect").attr("rx", 4).attr("ry", 4);
        revivalLabel.append("text");
        originalLabelsLayer = labelLayer.append("g");

        arcSelection = arcLayer.selectAll("path.arc");
        originalSelection = originalLayer.selectAll("g.original-mark");
        revivalSelection = revivalLayer.selectAll("g.revival-mark");

        if (!rows.length) {
          d3.select(chartNode)
            .append("div")
            .attr("class", "empty-state")
            .text("No connections found for that year.");
          return;
        }

        const laidOut = computeLayout(rows, width, height);
        const transition = d3.transition().duration(animate ? 320 : 0);

        const groupedRevivals = Array.from(d3.group(laidOut, (d) => d.revivalKey), ([revivalKey, originals]) => {
          const first = originals[0];
          return {
            revivalKey,
            id: `revival:${revivalKey}`,
            revivalSong: first.revivalSong,
            revivalArtist: first.revivalArtist,
            revivalPeak: first.revivalPeak,
            revivalX: first.revivalX,
            revivalY: first.revivalY,
            revivalR: first.revivalR,
            revivalColor: first.revivalColor,
            originals
          };
        });

        const buildZoneBand = (label, color, opacity, predicate) => {
          const zoneItems = groupedRevivals.filter((revival) => predicate(revival.revivalPeak));
          if (!zoneItems.length) {
            return null;
          }

          const yValues = zoneItems.map((revival) => revival.revivalY);
          return {
            label,
            color,
            opacity,
            y0: d3.min(yValues) - slotHeight / 2,
            y1: d3.max(yValues) + slotHeight / 2,
          };
        };

        const zoneBands = [
          buildZoneBand("#1 hits", "#E07A5F", 0.18, (peak) => peak === 1),
          buildZoneBand("Top 10", "#E8A838", 0.14, (peak) => peak >= 2 && peak <= 10),
          buildZoneBand("Top 40", "#A8DADC", 0.1, (peak) => peak >= 11 && peak <= 40),
          buildZoneBand("Charted", "#9B72AA", 0.07, (peak) => peak >= 41 && peak <= 100),
          { label: "Never charted", color: "#D4C5B0", opacity: 0.08, y0: height - 40, y1: height }
        ].filter(Boolean);

        const bandGroups = bandLayer.selectAll("g.zone-band").data(zoneBands, (d) => d.label);
        const bandEnter = bandGroups.join((enter) => {
          const group = enter.append("g").attr("class", "zone-band");
          group.append("rect");
          group.append("text");
          return group;
        });
        const mergedBands = bandLayer.selectAll("g.zone-band");

        mergedBands.select("rect")
          .attr("x", 0)
          .attr("y", (d) => d.y0)
          .attr("width", width)
          .attr("height", (d) => Math.max(0, d.y1 - d.y0))
          .attr("fill", (d) => d.color)
          .attr("fill-opacity", (d) => d.opacity);

        mergedBands.select("text")
          .attr("x", 8)
          .attr("y", (d) => d.y0 + Math.max(9, (d.y1 - d.y0) / 2))
          .attr("fill", (d) => d.color)
          .attr("fill-opacity", 0.6)
          .attr("font-size", 10)
          .attr("font-weight", 600)
          .attr("font-style", "italic")
          .text((d) => d.label);

        const leftMargin = 80;
        const timelineY = height - 15;
        const timelineTicks = [1960, 1970, 1980, 1990, 2000, 2010];
        const currentYear =
          activeYear === "ALL" ? d3.max(rows, (row) => row.revivalChartYear) || DEFAULT_YEAR : activeYear;
        const timelineXForYear = (year) =>
          clamp((width - 200) - ((currentYear - year) / 90) * (width * 0.85), leftMargin, width - 200);

        const timelineGroup = timelineLayer.selectAll("g.reference-timeline").data([null]).join("g").attr("class", "reference-timeline");
        timelineGroup
          .selectAll("line.timeline-axis")
          .data([null])
          .join("line")
          .attr("class", "timeline-axis")
          .attr("x1", leftMargin)
          .attr("x2", width - 200)
          .attr("y1", timelineY)
          .attr("y2", timelineY)
          .attr("stroke", "#ccc");

        const tickGroups = timelineGroup.selectAll("g.timeline-tick").data(timelineTicks, (d) => d);
        const mergedTicks = tickGroups.join((enter) => {
          const g = enter.append("g").attr("class", "timeline-tick");
          g.append("line");
          g.append("text");
          return g;
        });

        mergedTicks.select("line")
          .attr("x1", (d) => timelineXForYear(d))
          .attr("x2", (d) => timelineXForYear(d))
          .attr("y1", timelineY - 3)
          .attr("y2", timelineY + 3)
          .attr("stroke", "#ccc");

        mergedTicks.select("text")
          .attr("x", (d) => timelineXForYear(d))
          .attr("y", height - 18)
          .attr("fill", "#bbb")
          .attr("font-size", 10)
          .attr("text-anchor", "middle")
          .text((d) => d);

        const revivalWithMostOriginals = groupedRevivals.reduce(
          (best, revival) => (!best || revival.originals.length > best.originals.length ? revival : best),
          null
        );
        if (revivalWithMostOriginals) {
          console.log("revival with most originals", {
            revival_song: revivalWithMostOriginals.revivalSong,
            revival_artist: revivalWithMostOriginals.revivalArtist,
            original_count: revivalWithMostOriginals.originals.length,
            originals: revivalWithMostOriginals.originals.map((item) => ({
              original_song: item.originalSong,
              original_artist: item.originalArtist,
            })),
          });
        }

        const arcData = groupedRevivals.flatMap((revival) => revival.originals);

        arcSelection = arcLayer.selectAll("path.arc").data(arcData, (d) => d.id);

        arcSelection
          .join(
            (enter) =>
              enter
                .append("path")
                .attr("class", "arc")
                .attr("d", (d) => d.path)
                .attr("stroke", (d) => d.stroke)
                .attr("stroke-width", (d) => d.strokeWidth)
                .style("opacity", 0)
                .call((enterSelection) => enterSelection.transition(transition).style("opacity", 0.06)),
            (update) =>
              update.call((updateSelection) =>
                updateSelection
                  .transition(transition)
                  .attr("d", (d) => d.path)
                  .attr("stroke", (d) => d.stroke)
                  .attr("stroke-width", (d) => d.strokeWidth)
                  .style("opacity", 0.06)
              ),
            (exit) => exit.call((exitSelection) => exitSelection.transition(transition).style("opacity", 0).remove())
          );

        arcSelection = arcLayer.selectAll("path.arc");

        originalSelection = originalLayer.selectAll("g.original-mark").data(laidOut, (d) => d.id);

        originalSelection
          .join(
            (enter) => {
              const group = enter
                .append("g")
                .attr("class", (d) => `original-mark ${d.everCharted ? "charted" : "uncharted"}`)
                .attr("transform", (d) => `translate(${d.originalX},${d.originalY}) scale(1)`)
                .style("opacity", 0);

              group
                .append("circle")
                .attr("r", (d) => d.originalR)
                .attr("fill", (d) => d.originalColor)
                .attr("fill-opacity", (d) => (d.everCharted ? 0.7 : 0.4))
                .attr("stroke", (d) => (d.everCharted ? colorWithOpacity(d.originalColor, 0.35) : "rgba(212,197,176,0.35)"))
                .attr("stroke-width", 1);

              group.call((enterSelection) => enterSelection.transition(transition).style("opacity", 1));
              return group;
            },
            (update) =>
              update.call((updateSelection) =>
                updateSelection
                  .transition(transition)
                  .attr("transform", (d) => `translate(${d.originalX},${d.originalY}) scale(1)`)
                  .style("opacity", 1)
              ),
            (exit) => exit.call((exitSelection) => exitSelection.transition(transition).style("opacity", 0).remove())
          );

        originalSelection = originalLayer.selectAll("g.original-mark");
        originalSelection
          .select("circle")
          .transition(transition)
          .attr("r", (d) => d.originalR)
          .attr("fill", (d) => d.originalColor)
          .attr("fill-opacity", (d) => (d.everCharted ? 0.7 : 0.4))
          .attr("stroke", (d) => (d.everCharted ? colorWithOpacity(d.originalColor, 0.35) : "rgba(212,197,176,0.35)"));

        revivalSelection = revivalLayer.selectAll("g.revival-mark").data(groupedRevivals, (d) => d.id);

        revivalSelection
          .join(
            (enter) => {
              const group = enter
                .append("g")
                .attr("class", "revival-mark")
                .attr("transform", (d) => `translate(${d.revivalX},${d.revivalY})`)
                .style("opacity", 0);

              group
                .append("circle")
                .attr("r", (d) => d.revivalR)
                .attr("fill", (d) => d.revivalColor)
                .attr("fill-opacity", 0.85)
                .attr("stroke", (d) => d.revivalColor)
                .attr("stroke-width", 1);

              group.call((enterSelection) => enterSelection.transition(transition).style("opacity", 1));
              return group;
            },
            (update) =>
              update.call((updateSelection) =>
                updateSelection
                  .transition(transition)
                  .attr("transform", (d) => `translate(${d.revivalX},${d.revivalY})`)
                  .style("opacity", 1)
              ),
            (exit) => exit.call((exitSelection) => exitSelection.transition(transition).style("opacity", 0).remove())
          );

        revivalSelection = revivalLayer.selectAll("g.revival-mark");
        revivalSelection
          .select("circle")
          .transition(transition)
          .attr("r", (d) => d.revivalR)
          .attr("fill", (d) => d.revivalColor)
          .attr("stroke", (d) => d.revivalColor);

        bindInteraction(arcSelection);
        bindInteraction(originalSelection);

        revivalSelection
          .on("mouseenter", function (event, revival) {
            if (lockedId && lockedId !== revival.id) {
              return;
            }

            d3.select(this).raise();
            applyRevivalFocus(revival, !lockedId);
          })
          .on("mouseleave", function () {
            if (!lockedId) {
              resetFocus();
            }
          })
          .on("click", function (event, revival) {
            event.stopPropagation();
            lockedId = revival.id;
            d3.select(this).raise();
            applyRevivalFocus(revival, false);
          });

        if (lockedId) {
          const lockedRevival = groupedRevivals.find((revival) => revival.id === lockedId);
          if (lockedRevival) {
            applyRevivalFocus(lockedRevival, false);
          } else {
            const lockedLink = arcData.find((row) => row.id === lockedId);
            if (lockedLink) {
              applyFocus(lockedLink, false);
            } else {
              lockedId = null;
              resetFocus();
            }
          }
        } else {
          resetFocus();
        }
      }

      d3.csv("sample_pairs_clean.csv", (row, index) => {
        const revivalPeak = Number(row.revival_peak);
        const revivalChartYear = Number(row.revival_chart_year);
        const originalPeak = Number(row.original_peak);
        const yearsBetween = Number(row.years_between);
        const originalReleaseYear = Number(row.original_release_year);
        const revivalSpotifyPopularity = Number(row.revival_spotify_popularity);
        const revivalWeeksOnChart = Number(row.revival_weeks_on_chart);
        const originalWeeksOnChart = Number(row.original_weeks_on_chart);
        const everCharted = Number(row.ever_charted) === 1;
        const relationshipType = row.relationship_type;

        if (
          !Number.isFinite(revivalPeak) ||
          !Number.isFinite(revivalChartYear) ||
          !Number.isFinite(yearsBetween) ||
          !Number.isFinite(originalReleaseYear) ||
          !RELATIONSHIP_COLOR[relationshipType]
        ) {
          return null;
        }

        return {
          id: `link-${index}`,
          revivalSong: row.revival_song,
          revivalArtist: row.revival_artist,
          revivalPeak,
          revivalChartYear,
          revivalSpotifyPopularity: Number.isFinite(revivalSpotifyPopularity) ? revivalSpotifyPopularity : 0,
          revivalWeeksOnChart: Number.isFinite(revivalWeeksOnChart) ? revivalWeeksOnChart : 1,
          originalSong: row.original_song,
          originalArtist: row.original_artist,
          originalPeak: Number.isFinite(originalPeak) ? originalPeak : null,
          originalPeakDisplay: Number.isFinite(originalPeak) ? originalPeak : null,
          originalWeeksOnChart: Number.isFinite(originalWeeksOnChart) ? originalWeeksOnChart : 1,
          originalReleaseYear,
          everCharted,
          yearsBetween: clamp(yearsBetween, 0, 90),
          relationshipType
        };
      })
        .then((rows) => {
          allRows = rows.filter(Boolean);
          const revivalWeeksExtent = d3.extent(allRows, (row) => row.revivalWeeksOnChart);
          const originalWeeksExtent = d3.extent(allRows, (row) => row.originalWeeksOnChart);
          maxWeeksOnChart = Math.max(revivalWeeksExtent[1] || 1, originalWeeksExtent[1] || 1, 1);

          console.log("revival_weeks_on_chart", {
            min: revivalWeeksExtent[0],
            max: revivalWeeksExtent[1],
          });
          console.log("original_weeks_on_chart", {
            min: originalWeeksExtent[0],
            max: originalWeeksExtent[1],
          });

          buildButtons();
          render(false);

          document.addEventListener("click", () => {
            if (!lockedId) {
              return;
            }

            lockedId = null;
            resetFocus();
          });

          window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(() => render(false), 100);
          });
        })
        .catch((error) => {
          chartNode.innerHTML = `<div class="empty-state">Failed to load data: ${error.message}</div>`;
        });
    </script>
  </body>
</html>
